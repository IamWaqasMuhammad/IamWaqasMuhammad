<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0f1e;stop-opacity:1" />
    </linearGradient>
    <!-- Cyan glow gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#00FFFF;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#0080FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080FF;stop-opacity:0" />
    </linearGradient>
    <!-- Text glow filter -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip path for rounded rect -->
    <clipPath id="roundedClip">
      <rect width="900" height="280" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" rx="16" ry="16" fill="url(#bgGrad)"/>

  <!-- Animated grid lines -->
  <g clip-path="url(#roundedClip)" opacity="0.07">
    <line x1="0" y1="40" x2="900" y2="40" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="280" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="280" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="280" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="280" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="280" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="280" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="560" y1="0" x2="560" y2="280" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="280" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="280" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="280" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="880" y1="0" x2="880" y2="280" stroke="#00FFFF" stroke-width="0.5"/>
  </g>

  <!-- Glowing orbs in background -->
  <circle cx="100" cy="60" r="80" fill="#00FFFF" opacity="0.04">
    <animate attributeName="opacity" values="0.04;0.09;0.04" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="220" r="100" fill="#0080FF" opacity="0.05">
    <animate attributeName="opacity" values="0.05;0.12;0.05" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="140" r="150" fill="#00FFFF" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.06;0.02" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Top decorative line -->
  <rect x="0" y="0" width="900" height="3" rx="1" fill="url(#cyanGrad)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner accents -->
  <polyline points="20,40 20,20 40,20" fill="none" stroke="#00FFFF" stroke-width="2" opacity="0.8"/>
  <polyline points="860,20 880,20 880,40" fill="none" stroke="#00FFFF" stroke-width="2" opacity="0.8"/>
  <polyline points="20,240 20,260 40,260" fill="none" stroke="#00FFFF" stroke-width="2" opacity="0.8"/>
  <polyline points="860,260 880,260 880,240" fill="none" stroke="#00FFFF" stroke-width="2" opacity="0.8"/>

  <!-- Flutter logo icon (simplified) -->
  <g transform="translate(60, 95)" opacity="0.9">
    <polygon points="0,50 18,32 36,50 18,68" fill="#00FFFF" opacity="0.9" filter="url(#glowCyan)">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="18,10 36,28 54,10 36,-8" fill="#0080FF" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="18,32 36,14 54,32 36,50" fill="#40C4FF" opacity="0.7"/>
  </g>

  <!-- Animated scan line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#cyanGrad)" opacity="0.3">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,280;0,0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Main name — BIG, glowing -->
  <text x="450" y="115" 
    font-family="'Courier New', monospace" 
    font-size="58" 
    font-weight="900"
    text-anchor="middle"
    fill="#00FFFF"
    filter="url(#softGlow)"
    letter-spacing="6">
    WAQAS MUHAMMAD
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle line -->
  <text x="450" y="152"
    font-family="'Courier New', monospace"
    font-size="18"
    font-weight="400"
    text-anchor="middle"
    fill="#FFFFFF"
    opacity="0.75"
    letter-spacing="8">
    FLUTTER  DEVELOPER
  </text>

  <!-- Divider line with dots -->
  <line x1="200" y1="170" x2="370" y2="170" stroke="#00FFFF" stroke-width="1" opacity="0.5"/>
  <circle cx="385" cy="170" r="3" fill="#00FFFF" opacity="0.9"/>
  <circle cx="397" cy="170" r="2" fill="#0080FF" opacity="0.7"/>
  <circle cx="407" cy="170" r="1.5" fill="#40C4FF" opacity="0.5"/>
  <circle cx="415" cy="170" r="2" fill="#0080FF" opacity="0.7"/>
  <circle cx="427" cy="170" r="3" fill="#00FFFF" opacity="0.9"/>
  <line x1="440" y1="170" x2="610" y2="170" stroke="#00FFFF" stroke-width="1" opacity="0.5"/>

  <!-- Skill tags -->
  <g transform="translate(190, 192)">
    <!-- Firebase pill -->
    <rect x="0" y="0" width="90" height="26" rx="13" fill="#FFCA28" opacity="0.15"/>
    <rect x="0" y="0" width="90" height="26" rx="13" fill="none" stroke="#FFCA28" stroke-width="1" opacity="0.5"/>
    <text x="45" y="17.5" font-family="'Courier New', monospace" font-size="11" font-weight="700" text-anchor="middle" fill="#FFCA28">⚡ Firebase</text>

    <!-- GetX pill -->
    <rect x="100" y="0" width="70" height="26" rx="13" fill="#8E44AD" opacity="0.15"/>
    <rect x="100" y="0" width="70" height="26" rx="13" fill="none" stroke="#8E44AD" stroke-width="1" opacity="0.5"/>
    <text x="135" y="17.5" font-family="'Courier New', monospace" font-size="11" font-weight="700" text-anchor="middle" fill="#CE9BF5">GetX</text>

    <!-- BLoC pill -->
    <rect x="180" y="0" width="65" height="26" rx="13" fill="#40C4FF" opacity="0.12"/>
    <rect x="180" y="0" width="65" height="26" rx="13" fill="none" stroke="#40C4FF" stroke-width="1" opacity="0.5"/>
    <text x="212" y="17.5" font-family="'Courier New', monospace" font-size="11" font-weight="700" text-anchor="middle" fill="#40C4FF">BLoC</text>

    <!-- REST API pill -->
    <rect x="255" y="0" width="88" height="26" rx="13" fill="#FF6B35" opacity="0.12"/>
    <rect x="255" y="0" width="88" height="26" rx="13" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.5"/>
    <text x="299" y="17.5" font-family="'Courier New', monospace" font-size="11" font-weight="700" text-anchor="middle" fill="#FF6B35">REST API</text>

    <!-- Figma pill -->
    <rect x="353" y="0" width="70" height="26" rx="13" fill="#F24E1E" opacity="0.12"/>
    <rect x="353" y="0" width="70" height="26" rx="13" fill="none" stroke="#F24E1E" stroke-width="1" opacity="0.5"/>
    <text x="388" y="17.5" font-family="'Courier New', monospace" font-size="11" font-weight="700" text-anchor="middle" fill="#F24E1E">Figma</text>
  </g>

  <!-- Bottom decorative line -->
  <rect x="0" y="277" width="900" height="3" rx="1" fill="url(#cyanGrad)" opacity="0.6"/>

  <!-- Blinking cursor -->
  <rect x="730" y="95" width="3" height="40" fill="#00FFFF">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating particles -->
  <circle cx="150" cy="150" r="2" fill="#00FFFF" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="0,0;10,-20;0,0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="80" r="1.5" fill="#0080FF" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="0,0;-8,15;0,0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="160" r="2" fill="#40C4FF" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="0,0;5,-10;0,0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="200" r="1.5" fill="#00FFFF" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="0,0;12,8;0,0" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="7s" repeatCount="indefinite"/>
  </circle>
</svg>
